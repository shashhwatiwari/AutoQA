[pytest]
testpaths = tests
addopts =
    --html=reports/report.html
    --self-contained-html
    --junitxml=reports/junit.xml
    --strict-markers
    -v
markers =
    smoke:      fast sanity checks — a pass/fail answer in under 2 min; run on every commit
    regression: full regression suite — all layers; run on every PR and daily cron
    ui:         Selenium browser tests (requires Chrome)
    api:        requests-based REST API tests (no browser)
    slow:       individual tests that take > 10 s (delayed responses, dynamic loading)
