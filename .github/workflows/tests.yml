name: AutoQA Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # daily regression at 06:00 UTC
  workflow_dispatch:
    inputs:
      marker:
        description: "pytest marker to run (smoke | regression | ui | api)"
        required: false
        default: ""

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API tests
        run: pytest -m api --tb=short

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: reports/report.html

  ui-tests:
    name: UI Tests (headless Chrome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run UI tests
        env:
          CI: "true"
          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
        run: pytest -m ui --headless --tb=short

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-report
          path: reports/report.html

  smoke-tests:
    name: Smoke / Regression
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: github.event_name == 'schedule' || github.event.inputs.marker == 'regression'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run smoke suite
        env:
          CI: "true"
          BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}
        run: pytest -m "smoke or regression" --headless --tb=short

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: reports/report.html
